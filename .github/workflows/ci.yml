name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build image
        run: docker build .

  e2e:
    name: Frontend E2E
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build app image
        run: docker build -t tag-note:e2e .

      - name: Start app
        run: |
          docker run -d --rm \
            --name tag-note-e2e \
            -p 13777:3000 \
            -e JWT_SECRET=e2e-test-secret \
            -e TAGNOTE_TEST_MODE=1 \
            -e ADMIN_EMAIL=test@test.com \
            -e OPERATIONAL_BEARER_TOKEN=e2e-operational-token \
            tag-note:e2e

          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:13777/healthz >/dev/null; then
              exit 0
            fi
            sleep 1
          done

          docker logs tag-note-e2e
          exit 1

      - name: Install E2E dependencies
        run: |
          docker run --rm \
            -e PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 \
            -e npm_config_cache=/tmp/.npm \
            -v "$PWD":/app \
            -w /app \
            mcr.microsoft.com/playwright:v1.60.0-noble \
            npm ci

      - name: Run E2E tests
        run: |
          docker run --rm \
            --network host \
            -e E2E_BASE_URL=http://127.0.0.1:13777 \
            -e npm_config_cache=/tmp/.npm \
            -v "$PWD":/app \
            -w /app \
            mcr.microsoft.com/playwright:v1.60.0-noble \
            npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore

      - name: Stop app
        if: always()
        run: docker stop tag-note-e2e || true
